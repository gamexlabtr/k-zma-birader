<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kızma Birader Online - Çok Oyunculu</title>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          gridTemplateColumns: {
            '15': 'repeat(15, minmax(0, 1fr))',
          },
          gridTemplateRows: {
            '15': 'repeat(15, minmax(0, 1fr))',
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM UMD CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone for JSX compilation in-browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Compat CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    /* Custom confetti fall animation */
    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.3;
      }
    }
    .animate-confetti-fall {
      animation-name: confetti-fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }
    .clip-triangle {
      width: 0 !important;
      height: 0 !important;
    }

    /* Floating emoji animation */
    @keyframes float-emoji {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 0;
      }
      15% {
        opacity: 1;
        transform: translateY(-20px) scale(1.2);
      }
      85% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) scale(0.8);
        opacity: 0;
      }
    }
    .animate-float-emoji {
      animation: float-emoji 2.5s ease-out forwards;
    }

    /* Simple custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans select-none">

  <!-- React mounting root -->
  <div id="root"></div>

  <!-- Main Game Client Code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 1. FIREBASE INITIALIZATION ---
    const firebaseConfig = {
      databaseURL: "https://gmxlabtr-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();


    // --- 2. GAME CONSTANTS & MATH ENGINE ---
    const COLORS = ['red', 'green', 'blue', 'yellow'];

    const COLOR_NAMES = {
      red: 'Kırmızı',
      green: 'Yeşil',
      blue: 'Mavi',
      yellow: 'Sarı'
    };

    const COLOR_HEX = {
      red: '#ef4444',
      green: '#22c55e',
      blue: '#3b82f6',
      yellow: '#eab308'
    };

    const COLOR_BG_CLASS = {
      red: 'bg-red-500',
      green: 'bg-green-500',
      blue: 'bg-blue-500',
      yellow: 'bg-yellow-500'
    };

    const COLOR_TEXT_CLASS = {
      red: 'text-red-500',
      green: 'text-green-500',
      blue: 'text-blue-500',
      yellow: 'text-yellow-500'
    };

    // 15x15 Ludo board circular track coords
    const OUTER_TRACK_COORDS = [
      { r: 6, c: 0 }, { r: 6, c: 1 }, { r: 6, c: 2 }, { r: 6, c: 3 }, { r: 6, c: 4 }, { r: 6, c: 5 }, // 0-5
      { r: 5, c: 6 }, { r: 4, c: 6 }, { r: 3, c: 6 }, { r: 2, c: 6 }, { r: 1, c: 6 }, { r: 0, c: 6 }, // 6-11
      { r: 0, c: 7 }, // 12
      { r: 0, c: 8 }, { r: 1, c: 8 }, { r: 2, c: 8 }, { r: 3, c: 8 }, { r: 4, c: 8 }, { r: 5, c: 8 }, // 13-18
      { r: 6, c: 9 }, { r: 6, c: 10 }, { r: 6, c: 11 }, { r: 6, c: 12 }, { r: 6, c: 13 }, { r: 6, c: 14 }, // 19-24
      { r: 7, c: 14 }, // 25
      { r: 8, c: 14 }, { r: 8, c: 13 }, { r: 8, c: 12 }, { r: 8, c: 11 }, { r: 8, c: 10 }, { r: 8, c: 9 }, // 26-31
      { r: 9, c: 8 }, { r: 10, c: 8 }, { r: 11, c: 8 }, { r: 12, c: 8 }, { r: 13, c: 8 }, { r: 14, c: 8 }, // 32-37
      { r: 14, c: 7 }, // 38
      { r: 14, c: 6 }, { r: 13, c: 6 }, { r: 12, c: 6 }, { r: 11, c: 6 }, { r: 10, c: 6 }, { r: 9, c: 6 }, // 39-44
      { r: 8, c: 5 }, { r: 8, c: 4 }, { r: 8, c: 3 }, { r: 8, c: 2 }, { r: 8, c: 1 }, { r: 8, c: 0 }, // 45-50
      { r: 7, c: 0 } // 51
    ];

    const COLOR_START_INDEX = {
      red: 1,
      green: 14,
      blue: 27,
      yellow: 40
    };

    const SAFE_COORDS = [
      { r: 6, c: 1 }, { r: 1, c: 8 }, { r: 8, c: 13 }, { r: 13, c: 6 },
      { r: 2, c: 6 }, { r: 6, c: 12 }, { r: 12, c: 8 }, { r: 8, c: 2 }
    ];

    const isCellSafe = (r, c) => {
      return SAFE_COORDS.some(coord => coord.r === r && coord.c === c);
    };

    const BASE_COORDS = {
      red: [{ r: 2, c: 2 }, { r: 2, c: 3 }, { r: 3, c: 2 }, { r: 3, c: 3 }],
      green: [{ r: 2, c: 11 }, { r: 2, c: 12 }, { r: 3, c: 11 }, { r: 3, c: 12 }],
      blue: [{ r: 11, c: 11 }, { r: 11, c: 12 }, { r: 12, c: 11 }, { r: 12, c: 12 }],
      yellow: [{ r: 11, c: 2 }, { r: 11, c: 3 }, { r: 12, c: 2 }, { r: 12, c: 3 }]
    };

    const HOME_RUN_COORDS = {
      red: [{ r: 7, c: 1 }, { r: 7, c: 2 }, { r: 7, c: 3 }, { r: 7, c: 4 }, { r: 7, c: 5 }],
      green: [{ r: 1, c: 7 }, { r: 2, c: 7 }, { r: 3, c: 7 }, { r: 4, c: 7 }, { r: 5, c: 7 }],
      blue: [{ r: 7, c: 13 }, { r: 7, c: 12 }, { r: 7, c: 11 }, { r: 7, c: 10 }, { r: 7, c: 9 }],
      yellow: [{ r: 13, c: 7 }, { r: 12, c: 7 }, { r: 11, c: 7 }, { r: 10, c: 7 }, { r: 9, c: 7 }]
    };

    const GOAL_COORDS = {
      red: { r: 7, c: 6 },
      green: { r: 6, c: 7 },
      blue: { r: 7, c: 8 },
      yellow: { r: 8, c: 7 }
    };

    const getTokenCoords = (color, tokenIdx, step) => {
      if (step === -1) return BASE_COORDS[color][tokenIdx];
      if (step >= 0 && step <= 50) {
        const startIdx = COLOR_START_INDEX[color];
        return OUTER_TRACK_COORDS[(startIdx + step) % 52];
      }
      if (step >= 51 && step <= 55) return HOME_RUN_COORDS[color][step - 51];
      return GOAL_COORDS[color];
    };

    const canTokenMove = (color, tokenIdx, step, dice, allTokens, speedPreset = 'normal') => {
      if (step === 56) return false;
      if (step === -1) {
        if (speedPreset === 'crazy') return dice >= 4;
        if (speedPreset === 'fast') return dice >= 5;
        return dice === 6;
      }
      const targetStep = step + dice;
      if (targetStep > 56) return false;

      if (targetStep > 50 && targetStep < 56) {
        const targetCoords = getTokenCoords(color, tokenIdx, targetStep);
        const ownTokensOnTarget = allTokens[color].some((s, idx) => {
          if (idx === tokenIdx || s === -1 || s === 56) return false;
          const c = getTokenCoords(color, idx, s);
          return c.r === targetCoords.r && c.c === targetCoords.c;
        });
        if (ownTokensOnTarget) return false;
      }
      return true;
    };

    const getValidMoves = (color, dice, allTokens, speedPreset = 'normal') => {
      const valid = [];
      const tokens = allTokens[color];
      for (let i = 0; i < tokens.length; i++) {
        if (canTokenMove(color, i, tokens[i], dice, allTokens, speedPreset)) {
          valid.push(i);
        }
      }
      return valid;
    };

    const checkKick = (movingColor, targetCoords, allTokens) => {
      if (isCellSafe(targetCoords.r, targetCoords.c)) return null;

      for (const color of COLORS) {
        if (color === movingColor) continue;
        const tokens = allTokens[color];
        for (let i = 0; i < tokens.length; i++) {
          const step = tokens[i];
          if (step === -1 || step === 56) continue;
          const coord = getTokenCoords(color, i, step);
          if (coord.r === targetCoords.r && coord.c === targetCoords.c) {
            return { color, index: i };
          }
        }
      }
      return null;
    };

    const getNextTurn = (current, players, mode) => {
      const order = ['red', 'green', 'blue', 'yellow'];
      const startIdx = order.indexOf(current);

      for (let i = 1; i <= 4; i++) {
        const nextColor = order[(startIdx + i) % 4];
        if (mode === 'vs_bots' || mode === 'local' || players[nextColor] !== null) {
          return nextColor;
        }
      }
      return current;
    };

    const getBotMove = (color, dice, allTokens, speedPreset = 'normal') => {
      const validMoves = getValidMoves(color, dice, allTokens, speedPreset);
      if (validMoves.length === 0) return null;

      // 1. Kick Priority
      for (const idx of validMoves) {
        const currentStep = allTokens[color][idx];
        const targetStep = currentStep === -1 ? 0 : currentStep + dice;
        const targetCoords = getTokenCoords(color, idx, targetStep);
        if (checkKick(color, targetCoords, allTokens)) return idx;
      }

      // 2. Goal Priority
      for (const idx of validMoves) {
        if (allTokens[color][idx] + dice === 56) return idx;
      }

      // 3. Exit Base Priority
      for (const idx of validMoves) {
        if (allTokens[color][idx] === -1) return idx;
      }

      // 4. Furthest progress priority
      let bestIdx = validMoves[0];
      let maxStep = -2;
      for (const idx of validMoves) {
        if (allTokens[color][idx] > maxStep) {
          maxStep = allTokens[color][idx];
          bestIdx = idx;
        }
      }
      return bestIdx;
    };

    const createInitialState = (roomId, mode) => {
      const initialTokens = { red: [-1, -1, -1, -1], green: [-1, -1, -1, -1], blue: [-1, -1, -1, -1], yellow: [-1, -1, -1, -1] };
      return {
        roomId,
        status: 'waiting',
        players: { red: null, green: null, blue: null, yellow: null },
        spectators: [],
        currentTurn: 'red',
        diceValue: null,
        hasRolled: false,
        extraTurn: false,
        tokens: initialTokens,
        winner: null,
        logs: ['Oyun lobisi kuruldu. Oyuncular bekleniyor.'],
        createdAt: Date.now(),
        lastActive: Date.now(),
        gameMode: mode,
        speedPreset: 'normal'
      };
    };


    // --- 3. WEB AUDIO SYNTHESIZER ---
    const playSound = (type) => {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const ctx = new AudioContextClass();

        if (type === 'roll') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(130, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(350, ctx.currentTime + 0.35);
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.35);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.35);
        } else if (type === 'move') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(360, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(720, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.12);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.12);
        } else if (type === 'kick') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(290, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.45);
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.45);
        } else if (type === 'win') {
          const notes = [262, 330, 392, 523, 659, 784, 1047];
          notes.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.12);
            gain.gain.setValueAtTime(0.08, ctx.currentTime + idx * 0.12);
            gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + idx * 0.12 + 0.35);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(ctx.currentTime + idx * 0.12); osc.stop(ctx.currentTime + idx * 0.12 + 0.35);
          });
        }
      } catch (e) {
        console.warn('Ses çalma engellendi:', e);
      }
    };


    // --- 4. REACT COMPONENTS ---

    // Celebrations Confetti
    function Confetti() {
      const [particles, setParticles] = useState([]);
      useEffect(() => {
        const arr = [];
        for (let i = 0; i < 80; i++) {
          arr.push({
            id: i,
            x: Math.random() * 100,
            y: Math.random() * -20 - 5,
            color: ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#ec4899'][Math.floor(Math.random() * 5)],
            size: Math.random() * 8 + 6,
            shape: ['circle', 'square', 'triangle'][Math.floor(Math.random() * 3)],
            delay: Math.random() * 4,
            duration: Math.random() * 3 + 3,
            rotation: Math.random() * 360
          });
        }
        setParticles(arr);
      }, []);

      return (
        <div className="pointer-events-none fixed inset-0 z-50 overflow-hidden">
          {particles.map((p) => {
            const shapeStyle = p.shape === 'circle' ? 'rounded-full' : p.shape === 'triangle' ? 'clip-triangle' : 'rounded-sm';
            return (
              <div
                key={p.id}
                className={`absolute animate-confetti-fall ${shapeStyle}`}
                style={{
                  left: `${p.x}%`, top: `${p.y}%`, width: `${p.size}px`, height: `${p.size}px`,
                  backgroundColor: p.shape === 'triangle' ? 'transparent' : p.color,
                  borderLeft: p.shape === 'triangle' ? `${p.size / 2}px solid transparent` : undefined,
                  borderRight: p.shape === 'triangle' ? `${p.size / 2}px solid transparent` : undefined,
                  borderBottom: p.shape === 'triangle' ? `${p.size}px solid ${p.color}` : undefined,
                  animationDelay: `${p.delay}s`, animationDuration: `${p.duration}s`,
                  transform: `rotate(${p.rotation}deg)`, opacity: 0.8
                }}
              />
            );
          })}
        </div>
      );
    }

    // Interactive Dice
    function Dice({ value, onRoll, disabled, isRolling }) {
      const [localRolling, setLocalRolling] = useState(false);
      const [fakeValue, setFakeValue] = useState(1);

      useEffect(() => {
        if (isRolling) {
          setLocalRolling(true);
          const interval = setInterval(() => {
            setFakeValue(Math.floor(Math.random() * 6) + 1);
          }, 80);
          const timeout = setTimeout(() => {
            clearInterval(interval);
            setLocalRolling(false);
          }, 700);
          return () => { clearInterval(interval); clearTimeout(timeout); };
        }
      }, [isRolling]);

      const displayValue = localRolling ? fakeValue : value || 1;

      const renderDots = (num) => {
        const dotPositions = {
          1: ['col-start-2 row-start-2'],
          2: ['col-start-1 row-start-1', 'col-start-3 row-start-3'],
          3: ['col-start-1 row-start-1', 'col-start-2 row-start-2', 'col-start-3 row-start-3'],
          4: ['col-start-1 row-start-1', 'col-start-3 row-start-1', 'col-start-1 row-start-3', 'col-start-3 row-start-3'],
          5: ['col-start-1 row-start-1', 'col-start-3 row-start-1', 'col-start-2 row-start-2', 'col-start-1 row-start-3', 'col-start-3 row-start-3'],
          6: ['col-start-1 row-start-1', 'col-start-3 row-start-1', 'col-start-1 row-start-2', 'col-start-3 row-start-2', 'col-start-1 row-start-3', 'col-start-3 row-start-3']
        };
        return (
          <div className="grid grid-cols-3 grid-rows-3 gap-1.5 w-12 h-12 p-1.5">
            {(dotPositions[num] || []).map((pos, idx) => (
              <div key={idx} className={`${pos} w-2.5 h-2.5 bg-slate-800 rounded-full shadow-inner`} />
            ))}
          </div>
        );
      };

      return (
        <div className="flex flex-col items-center justify-center p-3 bg-white/60 backdrop-blur-md rounded-2xl border border-slate-200/50 shadow-sm">
          <button
            onClick={onRoll}
            disabled={disabled || localRolling}
            className={`
              relative w-20 h-20 bg-gradient-to-br from-amber-50 to-white 
              rounded-2xl shadow-lg border border-amber-200/40 flex items-center justify-center
              transition-all duration-300 transform outline-none
              ${disabled ? 'opacity-80 cursor-not-allowed filter grayscale' : 'hover:scale-105 active:scale-95 cursor-pointer'}
              ${localRolling ? 'animate-bounce rotate-180 scale-110 border-red-400 bg-red-50' : ''}
            `}
          >
            {!disabled && !localRolling && (
              <span className="absolute -inset-1 rounded-2xl bg-gradient-to-r from-yellow-400 to-amber-500 opacity-20 blur animate-pulse" />
            )}
            <div className="relative bg-white border border-slate-200 rounded-xl shadow-inner p-1">
              {renderDots(displayValue)}
            </div>
          </button>
          <span className="text-[10px] font-semibold text-slate-500 mt-2 tracking-wide uppercase">
            {localRolling ? 'Zar Atılıyor...' : disabled ? 'Zar Sırası Değil' : 'Zar At'}
          </span>
        </div>
      );
    }

    // Emoji Reactions Panel
    function Reactions({ onSendReaction }) {
      const emojis = ['😂', '😮', '😠', '🎉', '💩', '👍', '🔥', '👑'];
      return (
        <div className="bg-white p-3 rounded-2xl border border-slate-200/60 shadow-sm space-y-2">
          <div className="flex items-center gap-1.5 border-b border-slate-100 pb-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-wider">
            ⚡ Hızlı Tepki Emojileri
          </div>
          <div className="grid grid-cols-4 gap-1.5">
            {emojis.map((emoji) => (
              <button
                key={emoji}
                onClick={() => onSendReaction(emoji)}
                className="text-xl p-1.5 bg-slate-50 hover:bg-indigo-50 hover:scale-110 active:scale-95 border border-slate-100 hover:border-indigo-200 rounded-xl transition-all cursor-pointer flex items-center justify-center"
              >
                {emoji}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // Active Ludo Board UI
    function Board({ tokens, currentTurn, diceValue, validMoves, onTokenClick, myColor, hasRolled }) {
      const [hoveredToken, setHoveredToken] = useState(null);
      const isMyTurnToMove = myColor === currentTurn && hasRolled && validMoves.length > 0;

      const tokenCoordsMap = {};
      COLORS.forEach((color) => {
        tokens[color].forEach((step, index) => {
          const coords = getTokenCoords(color, index, step);
          const key = `${coords.r}_${coords.c}`;
          if (!tokenCoordsMap[key]) tokenCoordsMap[key] = [];
          tokenCoordsMap[key].push({ color, index });
        });
      });

      const getCellClassName = (r, c) => {
        if (r < 6 && c < 6) return 'bg-red-500/10 border border-red-500/10';
        if (r < 6 && c > 8) return 'bg-green-500/10 border border-green-500/10';
        if (r > 8 && c < 6) return 'bg-yellow-500/10 border border-yellow-500/10';
        if (r > 8 && c > 8) return 'bg-blue-500/10 border border-blue-500/10';

        if (r === 7 && c >= 1 && c <= 5) return 'bg-red-500/80 border border-red-600/20';
        if (c === 7 && r >= 1 && r <= 5) return 'bg-green-500/80 border border-green-600/20';
        if (r === 7 && c >= 9 && c <= 13) return 'bg-blue-500/80 border border-blue-600/20';
        if (c === 7 && r >= 9 && r <= 13) return 'bg-yellow-500/80 border border-yellow-600/20';

        if (r === 6 && c === 1) return 'bg-red-500 border border-red-600 shadow-inner';
        if (r === 1 && c === 8) return 'bg-green-500 border border-green-600 shadow-inner';
        if (r === 8 && c === 13) return 'bg-blue-500 border border-blue-600 shadow-inner';
        if (r === 13 && c === 6) return 'bg-yellow-500 border border-yellow-600 shadow-inner';

        if (isCellSafe(r, c)) return 'bg-indigo-50 border border-slate-300';

        if (r >= 6 && r <= 8 && c >= 6 && c <= 8) {
          if (r === 7 && c === 6) return 'bg-red-500/90';
          if (r === 6 && c === 7) return 'bg-green-500/90';
          if (r === 7 && c === 8) return 'bg-blue-500/90';
          if (r === 8 && c === 7) return 'bg-yellow-500/90';
          if (r === 7 && c === 7) return 'bg-gradient-to-br from-amber-400 to-yellow-300';
          return 'bg-amber-100/50';
        }
        return 'bg-white border border-slate-200 shadow-inner';
      };

      const renderGrid = () => {
        const grid = [];
        for (let r = 0; r < 15; r++) {
          for (let c = 0; c < 15; c++) {
            const isBaseSlot = ((r===2 || r===3)&&(c===2 || c===3)) || ((r===2 || r===3)&&(c===11 || c===12)) || ((r===11 || r===12)&&(c===2 || c===3)) || ((r===11 || r===12)&&(c===11 || c===12));
            const cellClass = getCellClassName(r, c);

            let isDestinationHighlight = false;
            if (hoveredToken && diceValue) {
              const tStep = tokens[hoveredToken.color][hoveredToken.index];
              if (tStep !== -1 && tStep + diceValue <= 56) {
                const destCoords = getTokenCoords(hoveredToken.color, hoveredToken.index, tStep + diceValue);
                if (destCoords.r === r && destCoords.c === c) isDestinationHighlight = true;
              } else if (tStep === -1 && diceValue === 6) {
                const destCoords = getTokenCoords(hoveredToken.color, hoveredToken.index, 0);
                if (destCoords.r === r && destCoords.c === c) isDestinationHighlight = true;
              }
            }

            grid.push(
              <div
                key={`${r}_${c}`}
                className={`relative flex items-center justify-center aspect-square transition-all duration-300 ${cellClass} ${isDestinationHighlight ? 'ring-4 ring-purple-500 ring-inset scale-105 z-10 shadow-lg' : ''}`}
                style={{ gridRowStart: r + 1, gridColumnStart: c + 1 }}
              >
                {isBaseSlot && (
                  <div className="w-4/5 h-4/5 rounded-full border-2 border-dashed border-slate-300 bg-white/70" />
                )}
              </div>
            );
          }
        }
        return grid;
      };

      const renderTokens = () => {
        return Object.entries(tokenCoordsMap).map(([coordKey, tokenList]) => {
          const [rStr, cStr] = coordKey.split('_');
          const r = parseInt(rStr); const c = parseInt(cStr);
          const count = tokenList.length;

          let layoutClass = 'flex items-center justify-center w-full h-full';
          if (count === 2) layoutClass = 'grid grid-cols-2 w-full h-full p-0.5 gap-0.5';
          else if (count >= 3) layoutClass = 'grid grid-cols-2 grid-rows-2 w-full h-full p-0.5 gap-0.5';

          return (
            <div key={coordKey} className={`${layoutClass} z-20`} style={{ gridRowStart: r + 1, gridColumnStart: c + 1 }}>
              {tokenList.map(({ color, index }) => {
                const isMovable = color === currentTurn && isMyTurnToMove && validMoves.includes(index);
                const baseBg = COLOR_BG_CLASS[color];
                const tokenHex = COLOR_HEX[color];

                return (
                  <button
                    key={`${color}_${index}`}
                    onMouseEnter={() => isMovable && setHoveredToken({ color, index })}
                    onMouseLeave={() => setHoveredToken(null)}
                    onClick={() => { if (isMovable) { onTokenClick(index); setHoveredToken(null); } }}
                    disabled={!isMovable}
                    style={{ boxShadow: `0 4px 6px ${tokenHex}40, inset 0 2px 4px rgba(255,255,255,0.4)` }}
                    className={`rounded-full border border-white aspect-square relative flex items-center justify-center transition-all duration-200 outline-none
                      ${baseBg} ${count === 1 ? 'w-4/5 h-4/5' : 'w-full h-full'}
                      ${isMovable ? 'animate-bounce cursor-pointer ring-4 ring-white ring-offset-2 ring-offset-purple-500 scale-110 z-30' : ''}
                    `}
                  >
                    <div className="w-1/2 h-1/2 rounded-full border border-white/40 bg-white/25 shadow-inner flex items-center justify-center font-bold text-[8px] text-white">
                      {index + 1}
                    </div>
                  </button>
                );
              })}
            </div>
          );
        });
      };

      return (
        <div className="relative p-1.5 md:p-3 bg-slate-900 rounded-2xl shadow-2xl border-4 border-slate-800 flex items-center justify-center w-full max-w-[500px] aspect-square">
          <div className="grid grid-cols-15 grid-rows-15 gap-[1.5px] w-full h-full bg-slate-800 rounded-lg overflow-hidden relative">
            {renderGrid()}
            {renderTokens()}
          </div>
        </div>
      );
    }

    // --- 5. MAIN CONTAINER CONTROLLER ---
    function App() {
      const [uid, setUid] = useState('');
      const [nickname, setNickname] = useState('');
      const [view, setView] = useState('menu');
      const [gameMode, setGameMode] = useState('vs_bots');
      const [roomId, setRoomId] = useState('');
      const [inputRoomId, setInputRoomId] = useState('');
      const [myColor, setMyColor] = useState(null);
      
      const [gameState, setGameState] = useState(null);
      const [isRolling, setIsRolling] = useState(false);
      const [botDelay, setBotDelay] = useState(1000);
      const [errorMessage, setErrorMessage] = useState('');
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [stats, setStats] = useState({ gamesPlayed: 0, wins: 0, losses: 0, kicks: 0 });
      const [floatingEmojis, setFloatingEmojis] = useState([]);

      useEffect(() => {
        let savedUid = localStorage.getItem('ludo_uid');
        if (!savedUid) {
          savedUid = 'usr_' + Math.random().toString(36).substring(2, 11);
          localStorage.setItem('ludo_uid', savedUid);
        }
        setUid(savedUid);

        let savedName = localStorage.getItem('ludo_nickname');
        if (!savedName) {
          savedName = 'Oyuncu_' + Math.floor(1000 + Math.random() * 9000);
          localStorage.setItem('ludo_nickname', savedName);
        }
        setNickname(savedName);

        const savedStats = localStorage.getItem('ludo_stats_v2');
        if (savedStats) setStats(JSON.parse(savedStats));

        // Network listeners
        const handleOnline = () => setIsOnline(true);
        const handleOffline = () => setIsOnline(false);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);

        // URL Hash detection for share links
        const hash = window.location.hash.replace('#', '').trim().toUpperCase();
        if (hash && hash.length === 6) {
          setInputRoomId(hash);
        } else {
          const savedRoomId = localStorage.getItem('ludo_active_room');
          if (savedRoomId) {
            setRoomId(savedRoomId);
            setGameMode('online');
            setView('lobby');
          }
        }

        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      useEffect(() => {
        if (uid && nickname && inputRoomId && view === 'menu') {
          handleJoinOnlineRoom();
        }
      }, [uid, nickname, inputRoomId]);

      // Database sync
      useEffect(() => {
        if (gameMode !== 'online' || !roomId) return;

        const roomRef = db.ref('rooms/' + roomId);
        const unsubscribe = roomRef.on('value', (snapshot) => {
          if (snapshot.exists()) {
            const val = snapshot.val();
            if (!val.spectators) val.spectators = [];
            if (!val.players) val.players = { red: null, green: null, blue: null, yellow: null };
            if (!val.logs) val.logs = [];
            setGameState(val);

            if (val.status === 'playing' && view === 'lobby') setView('game');

            let assigned = null;
            Object.entries(val.players).forEach(([color, p]) => {
              if (p && p.uid === uid) assigned = color;
            });
            setMyColor(assigned);

            // Sync reactions floating animation triggers
            if (val.reactions) {
              const list = Object.values(val.reactions);
              const latest = list.sort((a,b) => b.timestamp - a.timestamp)[0];
              if (latest && Date.now() - latest.timestamp < 3000) {
                // Ensure not already shown
                setFloatingEmojis((prev) => {
                  if (prev.some(x => x.timestamp === latest.timestamp)) return prev;
                  return [...prev, latest];
                });
              }
            }
          } else {
            setErrorMessage('Oda bulunamadı.');
            setView('menu');
          }
        });

        return () => roomRef.off('value', unsubscribe);
      }, [roomId, gameMode, uid, view]);

      // AI Bots movement orchestration
      useEffect(() => {
        if (!gameState || gameState.status !== 'playing' || isRolling) return;

        const activeColor = gameState.currentTurn;
        const activePlayer = gameState.players[activeColor];
        const isBotTurn = !activePlayer || activePlayer.isBot;

        let shouldOrchestrate = false;
        if (gameState.gameMode === 'vs_bots') {
          shouldOrchestrate = true;
        } else if (gameState.gameMode === 'online' && isBotTurn) {
          const amIHost = Object.values(gameState.players).some((p) => p?.uid === uid && p?.isHost) || 
                          (gameState.spectators.length > 0 && gameState.spectators[0].uid === uid && gameState.spectators[0].isHost);
          if (amIHost) shouldOrchestrate = true;
        }

        if (isBotTurn && shouldOrchestrate && !gameState.hasRolled) {
          const timer = setTimeout(() => triggerBotRoll(activeColor), botDelay);
          return () => clearTimeout(timer);
        }
      }, [gameState, isRolling, botDelay, uid]);

      const updateRoomState = async (updater) => {
        if (!gameState) return;
        const nextState = updater({ ...gameState });
        nextState.lastActive = Date.now();
        if (gameMode === 'online') {
          await db.ref('rooms/' + roomId).set(nextState);
        } else {
          setGameState(nextState);
        }
      };

      const incrementStat = (key) => {
        const nextStats = { ...stats };
        nextStats[key] += 1;
        setStats(nextStats);
        localStorage.setItem('ludo_stats_v2', JSON.stringify(nextStats));
      };

      const handleUpdateNickname = (newName) => {
        setNickname(newName);
        localStorage.setItem('ludo_nickname', newName);
      };

      const handleCreateRoom = async (mode) => {
        setGameMode(mode);
        if (mode === 'online') {
          const generatedId = Math.random().toString(36).substring(2, 8).toUpperCase();
          const initialState = createInitialState(generatedId, 'online');
          initialState.players.red = { uid, name: nickname, isHost: true, isReady: true };
          initialState.logs = [`${nickname} odayı kurdu ve Kırmızı olarak katıldı.`];

          try {
            await db.ref('rooms/' + generatedId).set(initialState);
            setRoomId(generatedId);
            setMyColor('red');
            setView('lobby');
            localStorage.setItem('ludo_active_room', generatedId);
            window.location.hash = generatedId;
          } catch (e) {
            setErrorMessage('Bağlantı hatası.');
          }
        } else if (mode === 'vs_bots') {
          const initialState = createInitialState('AI_ROOM', 'vs_bots');
          initialState.players.red = { uid, name: nickname, isHost: true, isReady: true };
          initialState.players.green = { uid: 'bot_green', name: 'Yeşil Bot', isBot: true };
          initialState.players.blue = { uid: 'bot_blue', name: 'Mavi Bot', isBot: true };
          initialState.players.yellow = { uid: 'bot_yellow', name: 'Sarı Bot', isBot: true };
          initialState.status = 'playing';
          setGameState(initialState);
          setMyColor('red');
          setView('game');
          incrementStat('gamesPlayed');
        } else {
          const initialState = createInitialState('LOCAL_ROOM', 'local');
          initialState.players.red = { uid: 'l_red', name: 'Kırmızı', isReady: true };
          initialState.players.green = { uid: 'l_green', name: 'Yeşil', isReady: true };
          initialState.players.blue = { uid: 'l_blue', name: 'Mavi', isReady: true };
          initialState.players.yellow = { uid: 'l_yellow', name: 'Sarı', isReady: true };
          initialState.status = 'playing';
          setGameState(initialState);
          setMyColor('red');
          setView('game');
          incrementStat('gamesPlayed');
        }
      };

      const handleJoinOnlineRoom = async () => {
        const target = inputRoomId.trim().toUpperCase();
        if (!target) return;
        setErrorMessage('');
        try {
          const snap = await db.ref('rooms/' + target).get();
          if (!snap.exists()) {
            setErrorMessage('Oda bulunamadı.');
            return;
          }
          const val = snap.val();
          if (!val.spectators) val.spectators = [];
          val.spectators.push({ uid, name: nickname, isHost: false, isReady: false });
          await db.ref('rooms/' + target).set(val);
          setRoomId(target);
          setGameMode('online');
          setView('lobby');
          localStorage.setItem('ludo_active_room', target);
          window.location.hash = target;
        } catch (e) {
          setErrorMessage('Giriş hatası.');
        }
      };

      const handleSelectColor = (color) => {
        updateRoomState((prev) => {
          const next = { ...prev };
          Object.keys(next.players).forEach((c) => {
            if (next.players[c]?.uid === uid) next.players[c] = null;
          });
          next.players[color] = { uid, name: nickname, isHost: false, isReady: false };
          next.spectators = next.spectators.filter(s => s.uid !== uid);
          return next;
        });
      };

      const handleSetReady = (ready) => {
        updateRoomState((prev) => {
          const next = { ...prev };
          if (next.players[myColor]) next.players[myColor].isReady = ready;
          return next;
        });
      };

      const handleStartGame = () => {
        updateRoomState((prev) => {
          const next = { ...prev };
          next.status = 'playing';
          COLORS.forEach((col) => {
            if (!next.players[col]) {
              next.players[col] = { uid: `bot_${col}`, name: `${COLOR_NAMES[col]} Bot`, isBot: true, isReady: true };
            }
          });
          incrementStat('gamesPlayed');
          return next;
        });
      };

      const handleSetSpeedPreset = (preset) => {
        updateRoomState((prev) => {
          const next = { ...prev };
          next.speedPreset = preset;
          return next;
        });
      };

      const handleLeave = async () => {
        if (gameMode === 'online' && gameState) {
          const next = { ...gameState };
          Object.keys(next.players).forEach((c) => {
            if (next.players[c]?.uid === uid) next.players[c] = null;
          });
          next.spectators = next.spectators.filter(s => s.uid !== uid);
          await db.ref('rooms/' + roomId).set(next);
        }
        setRoomId('');
        setMyColor(null);
        setGameState(null);
        setView('menu');
        localStorage.removeItem('ludo_active_room');
        window.location.hash = '';
      };

      const triggerRoll = () => {
        if (!gameState || isRolling || gameState.hasRolled) return;
        updateRoomState((prev) => { prev.rollAnimState = true; return prev; });
        setIsRolling(true); playSound('roll');

        setTimeout(() => {
          setIsRolling(false);
          const rolled = Math.floor(Math.random() * 6) + 1;
          updateRoomState((prev) => {
            const next = { ...prev };
            next.rollAnimState = false;
            next.diceValue = rolled;
            next.hasRolled = true;

            const valid = getValidMoves(next.currentTurn, rolled, next.tokens, next.speedPreset);
            if (valid.length === 0) {
              setTimeout(() => {
                updateRoomState((passPrev) => {
                  const passNext = { ...passPrev };
                  if (passNext.currentTurn === next.currentTurn && passNext.hasRolled) {
                    passNext.currentTurn = getNextTurn(passNext.currentTurn, passNext.players, gameMode);
                    passNext.hasRolled = false;
                    passNext.diceValue = null;
                  }
                  return passNext;
                });
              }, 1500);
            }
            return next;
          });
        }, 700);
      };

      const triggerBotRoll = (botColor) => {
        if (!gameState || isRolling || gameState.hasRolled) return;
        updateRoomState((prev) => { prev.rollAnimState = true; return prev; });
        setIsRolling(true); playSound('roll');

        setTimeout(() => {
          setIsRolling(false);
          const rolled = Math.floor(Math.random() * 6) + 1;
          updateRoomState((prev) => {
            const next = { ...prev };
            next.rollAnimState = false;
            next.diceValue = rolled;
            next.hasRolled = true;

            const valid = getValidMoves(botColor, rolled, next.tokens, next.speedPreset);
            if (valid.length === 0) {
              setTimeout(() => {
                updateRoomState((passPrev) => {
                  const passNext = { ...passPrev };
                  if (passNext.currentTurn === botColor && passNext.hasRolled) {
                    passNext.currentTurn = getNextTurn(passNext.currentTurn, passNext.players, gameMode);
                    passNext.hasRolled = false;
                    passNext.diceValue = null;
                  }
                  return passNext;
                });
              }, 1500);
            } else {
              setTimeout(() => executeBotMove(botColor, rolled), botDelay / 2);
            }
            return next;
          });
        }, 700);
      };

      const executeBotMove = (botColor, dice) => {
        updateRoomState((prev) => {
          const next = { ...prev };
          const selected = getBotMove(botColor, dice, next.tokens, next.speedPreset);
          if (selected === null) {
            next.currentTurn = getNextTurn(botColor, next.players, gameMode);
            next.hasRolled = false; next.diceValue = null;
            return next;
          }

          const current = next.tokens[botColor][selected];
          const target = current === -1 ? 0 : current + dice;
          next.tokens[botColor][selected] = target;
          playSound('move');

          const kick = checkKick(botColor, getTokenCoords(botColor, selected, target), next.tokens);
          if (kick) { next.tokens[kick.color][kick.index] = -1; playSound('kick'); }

          const won = next.tokens[botColor].every(s => s === 56);
          if (won) { next.winner = botColor; next.status = 'finished'; return next; }

          const isCrazy = next.speedPreset === 'crazy';
          const isFast = next.speedPreset === 'fast';
          const isExtra = isCrazy ? (dice >= 4) : isFast ? (dice >= 5) : (dice === 6);

          if (isExtra) {
            next.hasRolled = false; next.diceValue = null;
          } else {
            next.currentTurn = getNextTurn(botColor, next.players, gameMode);
            next.hasRolled = false; next.diceValue = null;
          }
          return next;
        });
      };

      const handleTokenClick = (tokenIdx) => {
        if (!gameState || isRolling || !gameState.hasRolled) return;
        const color = gameState.currentTurn;
        const dice = gameState.diceValue;

        updateRoomState((prev) => {
          const next = { ...prev };
          const current = next.tokens[color][tokenIdx];
          const target = current === -1 ? 0 : current + dice;
          next.tokens[color][tokenIdx] = target;
          playSound('move');

          const kick = checkKick(color, getTokenCoords(color, tokenIdx, target), next.tokens);
          if (kick) {
            next.tokens[kick.color][kick.index] = -1; playSound('kick');
            if (color === myColor || gameMode === 'local' || (gameMode === 'vs_bots' && color === 'red')) {
              incrementStat('kicks');
            }
          }

          const won = next.tokens[color].every(s => s === 56);
          if (won) {
            next.winner = color; next.status = 'finished';
            if (color === myColor || (gameMode === 'vs_bots' && color === 'red')) {
              incrementStat('wins');
            } else {
              incrementStat('losses');
            }
            return next;
          }

          const isCrazy = next.speedPreset === 'crazy';
          const isFast = next.speedPreset === 'fast';
          const isExtra = isCrazy ? (dice >= 4) : isFast ? (dice >= 5) : (dice === 6);

          if (isExtra) {
            next.hasRolled = false; next.diceValue = null;
          } else {
            next.currentTurn = getNextTurn(color, next.players, gameMode);
            next.hasRolled = false; next.diceValue = null;
          }
          return next;
        });
      };

      const handleSendMessage = (text) => {
        const messageRef = db.ref('rooms/' + roomId + '/chat').push();
        messageRef.set({
          id: messageRef.key,
          sender: nickname,
          senderColor: myColor || 'system',
          text,
          timestamp: Date.now()
        });
      };

      const handleSendReaction = (emoji) => {
        if (gameMode !== 'online') return;
        const reactionRef = db.ref('rooms/' + roomId + '/reactions').push();
        reactionRef.set({
          sender: nickname,
          emoji,
          timestamp: Date.now()
        });
      };

      // Welcome Menu UI
      const renderMenu = () => {
        return (
          <div className="max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-8 justify-center min-h-[80vh] px-4">
            <div className="flex-1 text-center md:text-left space-y-4">
              <div className="inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 shadow-xl shadow-red-200 animate-pulse">
                <span className="text-white text-2xl font-bold">🏆</span>
              </div>
              <div>
                <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 bg-clip-text text-transparent bg-gradient-to-r from-red-600 via-indigo-600 to-blue-600">
                  Kızma Birader
                </h1>
                <p className="text-xs font-bold text-indigo-600 uppercase tracking-widest mt-1">Multiplayer Online</p>
              </div>

              <div className="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm max-w-sm space-y-4">
                <div>
                  <label className="text-xs font-bold text-slate-500 block mb-1">Oyuncu Adın</label>
                  <input
                    type="text" value={nickname} onChange={(e) => handleUpdateNickname(e.target.value)}
                    placeholder="Takma adın..." className="w-full text-sm font-semibold px-4 py-2 border rounded-xl outline-none"
                  />
                </div>

                <div className="border-t border-slate-100 pt-3 space-y-2">
                  <span className="text-[10px] font-extrabold text-indigo-600 uppercase tracking-wider block">Kişisel Performans Karnen</span>
                  <div className="grid grid-cols-4 gap-1.5 text-center text-xs">
                    <div className="bg-slate-50 p-1.5 rounded-lg border">
                      <span className="text-[9px] text-slate-400 block font-bold">Maç</span>
                      <span className="font-extrabold text-slate-700">{stats.gamesPlayed}</span>
                    </div>
                    <div className="bg-emerald-50/50 p-1.5 rounded-lg border border-emerald-100">
                      <span className="text-[9px] text-emerald-600 block font-bold">Zafer</span>
                      <span className="font-extrabold text-emerald-700">{stats.wins}</span>
                    </div>
                    <div className="bg-red-50/50 p-1.5 rounded-lg border border-red-100">
                      <span className="text-[9px] text-red-500 block font-bold">Yenilgi</span>
                      <span className="font-extrabold text-red-700">{stats.losses}</span>
                    </div>
                    <div className="bg-amber-50/50 p-1.5 rounded-lg border border-amber-100">
                      <span className="text-[9px] text-amber-600 block font-bold">Oran %</span>
                      <span className="font-extrabold text-amber-700">{stats.gamesPlayed > 0 ? Math.round((stats.wins / stats.gamesPlayed) * 100) : 0}</span>
                    </div>
                  </div>
                  <div className="flex items-center justify-between text-[10px] text-slate-400 font-bold px-1">
                    <span>⚔️ Toplam Kırılan Taş:</span>
                    <span className="text-slate-600">{stats.kicks}</span>
                  </div>
                </div>
              </div>
            </div>

            <div className="w-full max-w-sm bg-white border border-slate-200 p-6 rounded-3xl shadow-xl space-y-4">
              <h3 className="text-sm font-bold text-slate-700 uppercase text-center mb-2">Mod Seçimi</h3>
              <button onClick={() => handleCreateRoom('vs_bots')} className="w-full p-4 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-2xl font-bold text-sm text-left">
                🤖 Yapay Zekaya Karşı (Solo)
              </button>
              <button onClick={() => handleCreateRoom('local')} className="w-full p-4 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white rounded-2xl font-bold text-sm text-left">
                📱 Aynı Cihazda (Yerel Maç)
              </button>
              <div className="border-t border-slate-100 my-4" />
              <button onClick={() => handleCreateRoom('online')} className="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-xs">
                🌐 Yeni Çevrimiçi Oda Kur
              </button>
              <div className="flex gap-2">
                <input
                  type="text" value={inputRoomId} onChange={(e) => setInputRoomId(e.target.value)}
                  placeholder="Oda Kodu..." maxLength={6} className="flex-1 text-center font-mono uppercase font-bold text-xs border rounded-xl"
                />
                <button onClick={handleJoinOnlineRoom} className="px-4 py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold">Giriş Yap</button>
              </div>
              {errorMessage && <p className="text-xs text-red-500 text-center">{errorMessage}</p>}
            </div>
          </div>
        );
      };

      // Game UI
      const renderGame = () => {
        if (!gameState) return null;
        const activeColor = gameState.currentTurn;
        const isMyTurnToRoll = gameState.winner === null && !gameState.hasRolled && !isRolling && (gameMode !== 'online' || activeColor === myColor);
        const validMoves = gameState.hasRolled && gameState.diceValue !== null ? getValidMoves(activeColor, gameState.diceValue, gameState.tokens, gameState.speedPreset) : [];

        const chatMessages = gameState.chat ? Object.values(gameState.chat).sort((a,b) => a.timestamp - b.timestamp) : [];

        return (
          <div className="max-w-6xl mx-auto px-2 py-4 grid grid-cols-1 lg:grid-cols-12 gap-6 items-start relative">
            {gameState.winner && <Confetti />}

            {/* Floating emojis overlay */}
            <div className="absolute top-20 left-1/2 -translate-x-1/2 pointer-events-none z-50 flex flex-col gap-2">
              {floatingEmojis.map((rx) => (
                <div key={rx.timestamp} className="animate-float-emoji bg-white/90 shadow px-3 py-1.5 rounded-full flex items-center gap-1">
                  <span className="text-xs font-extrabold text-slate-800">{rx.sender}:</span>
                  <span className="text-lg">{rx.emoji}</span>
                </div>
              ))}
            </div>

            <div className="lg:col-span-6 flex flex-col items-center gap-4">
              <Board
                tokens={gameState.tokens} currentTurn={activeColor} diceValue={gameState.diceValue}
                validMoves={validMoves} onTokenClick={handleTokenClick} myColor={gameMode === 'online' ? myColor : activeColor}
                hasRolled={gameState.hasRolled}
              />
            </div>

            <div className="lg:col-span-3 space-y-4">
              <div className="bg-gradient-to-br from-indigo-900 to-slate-950 text-white p-4 rounded-2xl shadow-xl border space-y-3.5">
                <Dice
                  value={gameState.diceValue} onRoll={triggerRoll} disabled={!isMyTurnToRoll}
                  isRolling={isRolling || !!gameState.rollAnimState}
                />
              </div>

              {gameMode === 'online' && (
                <>
                  <Reactions onSendReaction={handleSendReaction} />
                  <Chat messages={chatMessages} onSendMessage={handleSendMessage} myColor={myColor} myName={nickname} />
                </>
              )}
            </div>

            <div className="lg:col-span-3">
              <Sidebar
                players={gameState.players} currentTurn={activeColor} tokens={gameState.tokens}
                winner={gameState.winner} logs={gameState.logs} onLeave={handleLeave} gameMode={gameMode}
                myColor={gameMode === 'online' ? myColor : null} botDelay={botDelay} setBotDelay={setBotDelay}
              />
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-white border-b border-slate-200/50 px-4 py-3 sticky top-0 z-45 flex items-center justify-between">
            <button onClick={handleLeave} className="flex items-center gap-2 text-left">
              <span className="text-xl">🎲</span>
              <div>
                <h1 className="text-sm font-black text-slate-900 leading-none">Kızma Birader</h1>
                <span className="text-[10px] text-slate-400 font-bold block">Online Çok Oyunculu</span>
              </div>
            </button>

            {!isOnline && (
              <span className="text-[10px] bg-red-50 border border-red-200 text-red-600 px-3 py-1 rounded-full font-extrabold animate-pulse uppercase tracking-wide">
                ⚠️ Çevrimdışı Mod
              </span>
            )}

            {view !== 'menu' && (
              <button onClick={handleLeave} className="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-xs font-bold">
                Odadan Ayrıl
              </button>
            )}
          </header>

          <main className="flex-1 max-w-6xl w-full mx-auto py-6">
            {view === 'menu' && renderMenu()}
            {view === 'lobby' && (
              <Lobby
                roomId={roomId} players={gameState?.players || {}} spectators={gameState?.spectators || []}
                myColor={myColor} myName={nickname} myUid={uid} onSelectColor={handleSelectColor}
                onSetReady={handleSetReady} onStartGame={handleStartGame} onSetName={handleUpdateNickname}
                onLeave={handleLeave} speedPreset={gameState?.speedPreset || 'normal'} onSetSpeedPreset={handleSetSpeedPreset}
              />
            )}
            {view === 'game' && renderGame()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
